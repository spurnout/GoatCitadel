<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mission Control Screenshots</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #120905;
        color: #f3d8c2;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }
      h1 {
        margin: 0 0 16px;
        color: #ff8c2a;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .card {
        border: 1px solid #5f3218;
        border-radius: 12px;
        background: #2a170d;
        padding: 10px;
      }
      .card h2 {
        margin: 0 0 8px;
        font-size: 16px;
        color: #ffb67a;
      }
      img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid #5f3218;
      }
      a {
        color: #ff8c2a;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Mission Control Screenshots</h1>
      <p>
        Folder: <code>F:\code\personal-ai\artifacts\screenshots\mission-control</code>
      </p>
      <div class="grid">
        <section class="card"><h2>Dashboard</h2><img src="./dashboard.png" alt="Dashboard screenshot" /></section>
        <section class="card"><h2>System</h2><img src="./system.png" alt="System screenshot" /></section>
        <section class="card"><h2>Files</h2><img src="./files.png" alt="Files screenshot" /></section>
        <section class="card"><h2>Memory</h2><img src="./memory.png" alt="Memory screenshot" /></section>
        <section class="card"><h2>Agents</h2><img src="./agents.png" alt="Agents screenshot" /></section>
        <section class="card"><h2>Office</h2><img src="./office.png" alt="Office screenshot" /></section>
        <section class="card"><h2>Activity</h2><img src="./activity.png" alt="Activity screenshot" /></section>
        <section class="card"><h2>Cron</h2><img src="./cron.png" alt="Cron screenshot" /></section>
        <section class="card"><h2>Sessions</h2><img src="./sessions.png" alt="Sessions screenshot" /></section>
        <section class="card"><h2>Skills</h2><img src="./skills.png" alt="Skills screenshot" /></section>
        <section class="card"><h2>Costs</h2><img src="./costs.png" alt="Costs screenshot" /></section>
        <section class="card"><h2>Settings</h2><img src="./settings.png" alt="Settings screenshot" /></section>
        <section class="card"><h2>Approvals</h2><img src="./approvals.png" alt="Approvals screenshot" /></section>
        <section class="card"><h2>Tasks</h2><img src="./tasks.png" alt="Tasks screenshot" /></section>
      </div>
    </main>
  </body>
</html>
