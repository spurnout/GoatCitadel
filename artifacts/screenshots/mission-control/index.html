<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GoatCitadel Mission Control Screenshots</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #120905;
        color: #f3d8c2;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }
      h1 {
        margin: 0 0 16px;
        color: #ff8c2a;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .card {
        border: 1px solid #5f3218;
        border-radius: 12px;
        background: #2a170d;
        padding: 10px;
      }
      .card h2 {
        margin: 0 0 8px;
        font-size: 16px;
        color: #ffb67a;
      }
      img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid #5f3218;
      }
      a {
        color: #ff8c2a;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>GoatCitadel Mission Control Screenshots</h1>
      <p>
        Folder: <code>&lt;repo-root&gt;\artifacts\screenshots\mission-control</code>
      </p>
      <div class="grid">
        <section class="card"><h2>Summit</h2><img src="./dashboard.png" alt="Summit dashboard screenshot" /></section>
        <section class="card"><h2>Engine</h2><img src="./system.png" alt="Engine screenshot" /></section>
        <section class="card"><h2>Trail Files</h2><img src="./files.png" alt="Trail files screenshot" /></section>
        <section class="card"><h2>Memory Pasture</h2><img src="./memory.png" alt="Memory pasture screenshot" /></section>
        <section class="card"><h2>Goat Crew</h2><img src="./agents.png" alt="Goat crew screenshot" /></section>
        <section class="card"><h2>Herd HQ (WebGL)</h2><img src="./office.png" alt="Herd HQ office screenshot" /></section>
        <section class="card"><h2>Pulse</h2><img src="./activity.png" alt="Pulse activity screenshot" /></section>
        <section class="card"><h2>Bell Tower</h2><img src="./cron.png" alt="Bell tower screenshot" /></section>
        <section class="card"><h2>Runs</h2><img src="./sessions.png" alt="Runs screenshot" /></section>
        <section class="card"><h2>Playbook Skills</h2><img src="./skills.png" alt="Playbook skills screenshot" /></section>
        <section class="card"><h2>Feed Ledger</h2><img src="./costs.png" alt="Feed ledger screenshot" /></section>
        <section class="card"><h2>Forge</h2><img src="./settings.png" alt="Forge settings screenshot" /></section>
        <section class="card"><h2>Gatehouse Queue</h2><img src="./approvals.png" alt="Gatehouse approvals screenshot" /></section>
        <section class="card"><h2>Trailboard</h2><img src="./tasks.png" alt="Trailboard screenshot" /></section>
        <section class="card"><h2>Connections</h2><img src="./integrations.png" alt="Connections screenshot" /></section>
      </div>
    </main>
  </body>
</html>
